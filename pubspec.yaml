name: duckbot_go
description: DuckBot Go - Mobile companion for DuckBot with inline generative UI
publish_to: 'none'
version: 3.0.4+304  # Integration release: chat lifecycle fixes, dashboard visualization, local metrics, docs/version cleanup

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.1.0
  web_socket_channel: ^2.4.0
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  path_provider: ^2.1.2
  uuid: ^4.2.2
  intl: ^0.19.0
  # Automation & Webhook Dependencies
  shelf: ^1.4.1  # HTTP server for webhooks
  shelf_router: ^1.1.4  # Router for shelf
  webkit_inspection_protocol: ^1.2.1  # JavaScript execution
  cron: ^0.6.1  # Cron scheduling
  multicast_dns: ^0.3.2+4  # mDNS/Bonjour discovery
  # Voice Dependencies
  speech_to_text: ^7.0.0  # Speech recognition
  flutter_tts: ^4.0.0  # Text-to-speech
  # QR Code
  qr_flutter: ^4.1.0  # QR code generation
  mobile_scanner: ^7.2.0  # QR code scanning
  # Export & Sharing
  pdf: ^3.10.8  # PDF generation
  share_plus: ^7.2.2  # System share sheet
  flutter_markdown_plus: ^1.0.7  # Markdown rendering (fork of discontinued flutter_markdown)
  url_launcher: ^6.2.2  # URL launching for links
  # Permissions
  permission_handler: ^11.3.0  # Runtime permissions
  # Notifications
  flutter_local_notifications: ^21.0.0  # Local notifications
  # File picking
  file_picker: ^8.0.0  # File selection for import
  # Weather
  geolocator: ^11.0.0  # Location services for weather
  # Charts
  fl_chart: ^1.1.1  # Beautiful charts and graphs

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/icons/app_icon.png
    - assets/images/
    - assets/animations/
  # Note: Custom fonts are disabled until actual font files are added.
  # See assets/fonts/README.md for instructions.
  # fonts:
  #   - family: OpenClaw
  #     fonts:
  #       - asset: assets/fonts/OpenClaw-Regular.ttf
  #       - asset: assets/fonts/OpenClaw-Bold.ttf
  #         weight: 700

flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21